<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  ::selection{background:#e3eef8;}
  input{font-family:'Public Sans',system-ui,sans-serif;}
  input::placeholder{color:#9aa4b2;}
  @keyframes swc-fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @keyframes swc-drift{0%,100%{transform:translate(0,0);}50%{transform:translate(0,-22px);}}
  @keyframes swc-spin{to{transform:rotate(360deg);}}
</style>
</helmet>

<div style="min-height:100vh;background:#f9fbfc;font-family:'Public Sans',system-ui,sans-serif;color:#19222e;display:flex;flex-direction:column;position:relative;overflow:hidden;-webkit-font-smoothing:antialiased;">

  <!-- Ambient daylight glows -->
  <div style="position:absolute;top:-180px;right:-120px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle at center,#e3eef8 0%,rgba(227,238,248,0) 70%);pointer-events:none;animation:swc-drift 14s ease-in-out infinite;"></div>
  <div style="position:absolute;bottom:-220px;left:-140px;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle at center,#eaf4ec 0%,rgba(234,244,236,0) 70%);pointer-events:none;animation:swc-drift 18s ease-in-out infinite reverse;"></div>

  <!-- Brand -->
  <header style="position:relative;z-index:2;padding:26px 30px;display:flex;align-items:center;gap:11px;">
    <div style="width:34px;height:34px;border-radius:9px;background:#2f7dc4;display:flex;align-items:center;justify-content:center;color:#fff;flex:none;box-shadow:0 6px 16px rgba(47,125,196,.28);">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h6a3 3 0 0 1 3 3v13a2.5 2.5 0 0 0-2.5-2.5H2z"></path><path d="M22 4h-6a3 3 0 0 0-3 3v13a2.5 2.5 0 0 1 2.5-2.5H22z"></path></svg>
    </div>
    <span style="font-family:'Bricolage Grotesque',system-ui,sans-serif;font-weight:700;font-size:20px;color:#19222e;letter-spacing:-.01em;">StudyWithCompany</span>
  </header>

  <!-- Card -->
  <main style="position:relative;z-index:2;flex:1;display:flex;align-items:center;justify-content:center;padding:24px 24px 64px;">
    <div style="width:100%;max-width:430px;background:#ffffff;border:1px solid #e7edf2;border-radius:22px;box-shadow:0 30px 70px rgba(25,34,46,.08),0 2px 6px rgba(25,34,46,.04);padding:clamp(30px,5vw,42px);animation:swc-fadeUp .5s ease both;">

      <h1 style="font-family:'Bricolage Grotesque',system-ui,sans-serif;font-weight:700;font-size:30px;letter-spacing:-.02em;color:#19222e;margin:0 0 7px;">{{ title }}</h1>
      <p style="font-size:15px;line-height:1.5;color:#5c6675;margin:0 0 28px;">{{ subtitle }}</p>

      <form onSubmit="{{ onSubmit }}" style="display:flex;flex-direction:column;gap:18px;">

        <sc-if value="{{ isSignup }}" hint-placeholder-val="{{ false }}">
          <label style="display:flex;flex-direction:column;gap:7px;">
            <span style="font-size:13.5px;font-weight:600;color:#19222e;">Nom d'utilisateur</span>
            <input value="{{ name }}" onInput="{{ onName }}" type="text" placeholder="Ton prénom" style="{{ inputStyle }}" onFocus="{{ onFocus }}" onBlur="{{ onBlur }}">
          </label>
        </sc-if>

        <label style="display:flex;flex-direction:column;gap:7px;">
          <span style="font-size:13.5px;font-weight:600;color:#19222e;">Email</span>
          <input value="{{ email }}" onInput="{{ onEmail }}" type="email" placeholder="toi@exemple.com" style="{{ emailStyle }}" onFocus="{{ onFocus }}" onBlur="{{ onBlur }}">
          <sc-if value="{{ emailError }}" hint-placeholder-val="{{ false }}">
            <span style="font-size:12.5px;color:#c0492f;font-weight:500;">{{ emailError }}</span>
          </sc-if>
        </label>

        <label style="display:flex;flex-direction:column;gap:7px;">
          <span style="font-size:13.5px;font-weight:600;color:#19222e;">Mot de passe</span>
          <div style="position:relative;display:flex;align-items:center;">
            <input value="{{ password }}" onInput="{{ onPassword }}" type="{{ passwordType }}" placeholder="••••••••" style="{{ passwordStyle }}" onFocus="{{ onFocus }}" onBlur="{{ onBlur }}">
            <button type="button" onClick="{{ togglePw }}" aria-label="Afficher le mot de passe" style="position:absolute;right:8px;display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:none;background:transparent;color:#8a94a3;cursor:pointer;border-radius:8px;">
              <span style="display:{{ eyeShow }};">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </span>
              <span style="display:{{ eyeHide }};">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.9 17.9A10.4 10.4 0 0 1 12 19c-7 0-11-7-11-7a18.5 18.5 0 0 1 5.1-5.9M9.9 4.2A10.1 10.1 0 0 1 12 5c7 0 11 7 11 7a18.4 18.4 0 0 1-2.2 3.2M1 1l22 22"></path><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path></svg>
              </span>
            </button>
          </div>
        </label>

        <sc-if value="{{ isLogin }}" hint-placeholder-val="{{ true }}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:-4px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;">
              <button type="button" onClick="{{ toggleRemember }}" style="{{ checkboxStyle }}">
                <span style="display:{{ checkShow }};color:#fff;line-height:0;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                </span>
              </button>
              <span style="font-size:13.5px;color:#5c6675;">Se souvenir de moi</span>
            </label>
            <a href="#" onClick="{{ preventDefault }}" style="font-size:13.5px;font-weight:600;color:#2f7dc4;text-decoration:none;">Mot de passe oublié&nbsp;?</a>
          </div>
        </sc-if>

        <button type="submit" style="{{ submitStyle }}">
          <sc-if value="{{ loading }}" hint-placeholder-val="{{ false }}">
            <span style="display:inline-block;width:17px;height:17px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:swc-spin .7s linear infinite;"></span>
          </sc-if>
          <sc-if value="{{ notLoading }}" hint-placeholder-val="{{ true }}">
            <span>{{ submitLabel }}</span>
          </sc-if>
        </button>
      </form>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:14px;margin:24px 0;">
        <span style="flex:1;height:1px;background:#e7edf2;"></span>
        <span style="font-size:12.5px;color:#9aa4b2;font-weight:500;">ou</span>
        <span style="flex:1;height:1px;background:#e7edf2;"></span>
      </div>

      <!-- SSO -->
      <button type="button" onClick="{{ onGoogle }}" style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;border:1px solid #e7edf2;border-radius:12px;padding:13px;font-size:14.5px;font-weight:600;color:#19222e;cursor:pointer;transition:background .18s,border-color .18s;" style-hover="background:#f5f8fb;border-color:#d4dde6;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"></path><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"></path><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"></path><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15A11 11 0 0 0 12 1 11 11 0 0 0 2.18 7.06l3.66 2.84C6.71 7.3 9.14 5.38 12 5.38z"></path></svg>
        Continuer avec Google
      </button>

      <!-- Mode switch -->
      <p style="text-align:center;font-size:14px;color:#5c6675;margin:24px 0 0;">
        {{ switchPrompt }}
        <a href="#" onClick="{{ toggleMode }}" style="font-weight:600;color:#2f7dc4;text-decoration:none;margin-left:4px;">{{ switchAction }}</a>
      </p>

    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props){
    super(props);
    this.state = {
      mode: 'login',
      name: '', email: '', password: '',
      showPw: false, remember: true,
      focused: null, loading: false,
      emailError: ''
    };
  }

  fieldStyle(key){
    const focused = this.state.focused === key;
    return {
      width:'100%', padding: key==='password' ? '13px 44px 13px 14px' : '13px 14px',
      fontSize:'15px', color:'#19222e',
      background:'#f9fbfc',
      border:'1px solid ' + (focused ? '#2f7dc4' : '#e7edf2'),
      borderRadius:'12px', outline:'none',
      boxShadow: focused ? '0 0 0 3px rgba(47,125,196,.14)' : 'none',
      transition:'border-color .18s, box-shadow .18s'
    };
  }

  validateEmail(v){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  submit(e){
    e && e.preventDefault();
    const { email, password } = this.state;
    if(!this.validateEmail(email)){
      this.setState({ emailError: 'Entre une adresse email valide.' });
      return;
    }
    if(!password){ return; }
    this.setState({ emailError:'', loading:true });
    clearTimeout(this._t);
    this._t = setTimeout(() => this.setState({ loading:false }), 1400);
  }

  componentWillUnmount(){ clearTimeout(this._t); }

  renderVals(){
    const isSignup = this.state.mode === 'signup';
    const isLogin = !isSignup;

    return {
      title: isSignup ? 'Créer un compte' : 'Connexion',
      subtitle: isSignup
        ? 'Rejoins les salles d\u2019\u00e9tude et avance avec les autres.'
        : 'Retrouvez vos camarades dans les salles d\u2019\u00e9tude.',

      isSignup, isLogin,
      name: this.state.name,
      email: this.state.email,
      password: this.state.password,
      emailError: this.state.emailError,

      passwordType: this.state.showPw ? 'text' : 'password',
      eyeShow: this.state.showPw ? 'none' : 'inline-flex',
      eyeHide: this.state.showPw ? 'inline-flex' : 'none',

      loading: this.state.loading,
      notLoading: !this.state.loading,
      submitLabel: isSignup ? 'Créer mon compte' : 'Se connecter',

      checkShow: this.state.remember ? 'inline-flex' : 'none',
      checkboxStyle: {
        width:'19px', height:'19px', flex:'none', borderRadius:'6px', cursor:'pointer',
        display:'flex', alignItems:'center', justifyContent:'center', padding:0,
        border:'1px solid ' + (this.state.remember ? '#2f7dc4' : '#cfd8e2'),
        background: this.state.remember ? '#2f7dc4' : '#fff',
        transition:'all .15s'
      },

      switchPrompt: isSignup ? 'Déjà un compte\u00a0?' : 'Pas encore de compte\u00a0?',
      switchAction: isSignup ? 'Se connecter' : 'Créer un compte',

      inputStyle: this.fieldStyle('name'),
      emailStyle: this.fieldStyle('email'),
      passwordStyle: this.fieldStyle('password'),
      submitStyle: {
        marginTop:'4px', width:'100%', minHeight:'50px',
        display:'flex', alignItems:'center', justifyContent:'center', gap:'9px',
        background: this.state.loading ? '#5896cf' : '#2f7dc4', color:'#fff',
        fontFamily:"'Public Sans',system-ui,sans-serif",
        fontSize:'15.5px', fontWeight:700, border:'none', borderRadius:'12px',
        cursor: this.state.loading ? 'default' : 'pointer',
        boxShadow:'0 10px 24px rgba(47,125,196,.30)',
        transition:'background .18s, transform .12s'
      },

      onName: (e) => this.setState({ name: e.target.value }),
      onEmail: (e) => this.setState({ email: e.target.value, emailError:'' }),
      onPassword: (e) => this.setState({ password: e.target.value }),
      onFocus: (e) => {
        const t = e.target.type;
        const key = t === 'email' ? 'email' : (t === 'password' || t === 'text' && this.state.mode!=='signup' ? 'password' : null);
        // resolve focus key reliably by placeholder
        const ph = e.target.placeholder;
        let k = ph && ph.indexOf('@') > -1 ? 'email' : (ph === '••••••••' ? 'password' : 'name');
        this.setState({ focused: k });
      },
      onBlur: () => this.setState({ focused: null }),
      togglePw: () => this.setState(s => ({ showPw: !s.showPw })),
      toggleRemember: () => this.setState(s => ({ remember: !s.remember })),
      preventDefault: (e) => e.preventDefault(),
      onGoogle: () => {},
      onSubmit: (e) => this.submit(e),
      toggleMode: (e) => { e.preventDefault(); this.setState(s => ({ mode: s.mode==='login'?'signup':'login', emailError:'' })); }
    };
  }
}
</script>
</body>
</html>
